version: '3.8'

services:
  alpha-fox-engine:
    build: .
    container_name: alpha_fox_2026
    volumes:
      - .:/app
    environment:
      - ENV=PROD
      - ARCHITECT=LauroBeckDBA
    restart: always
    healthcheck:
      # Check if the Stargate alert log has been touched in the last 5 mins
      test: ["CMD-SHELL", "find stargate_listener.py -mmin -5 || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

  # Ready for future expansion (e.g., Redis for tick-data)
